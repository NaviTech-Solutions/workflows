name: Build Java to Docker Image and Push to ECR
on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region"
        required: true
        default: "ap-east-1"
      aws-access-key-id:
        description: "AWS Access Key ID"
        required: true
      aws-secret-access-key:
        description: "AWS Secret Access Key"
        required: true
jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws-region }}
      AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
      AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
      ECR_REGISTRY: 390402541453.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com
    steps:
      # 01. 檢出代碼
      - name: 01. 檢出代碼
        uses: actions/checkout@v4.2.2

      # 02. 設置變數並打印信息
      - name: 02. 設置變數並打印信息
        run: |
          BRANCH_NAME=${{ github.ref_name }}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "Current branch: $BRANCH_NAME"

          REPO_NAME=$(basename "$PWD" | tr '[:upper:]' '[:lower:]')
          echo "ECR_REPOSITORY=$REPO_NAME" >> $GITHUB_ENV

          TAG_PREFIX="$BRANCH_NAME"
          echo "TAG_PREFIX=$TAG_PREFIX" >> $GITHUB_ENV

          IMAGE_TAG="${TAG_PREFIX}-$(date -u +"%Y%m%d-%H%M_UTC8" -d '+8 hours')"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          echo "ECR Repository: $ECR_REGISTRY/$REPO_NAME"
          echo "Image Tag: $IMAGE_TAG"

      # 03. 檢查並建立 ECR Repository
      - name: 03. 檢查並建立 ECR Repository
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_DEFAULT_REGION=${{ inputs.aws-region }} \
            amazon/aws-cli ecr describe-repositories \
              --repository-names ${{ env.ECR_REPOSITORY }} \
              --region ${{ inputs.aws-region }} 2>/dev/null || \
          docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_DEFAULT_REGION=${{ inputs.aws-region }} \
            amazon/aws-cli ecr create-repository \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --region ${{ inputs.aws-region }}

      # 04. 登入 Amazon ECR 並獲取 Token
      - name: 04. 登入 Amazon ECR
        run: |
          # 獲取 ECR token
          ECR_TOKEN=$(docker run --rm \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_DEFAULT_REGION=${{ inputs.aws-region }} \
            amazon/aws-cli ecr get-login-password \
              --region ${{ inputs.aws-region }})

          # 保存 token 供後續步驟使用
          echo "ECR_TOKEN=$ECR_TOKEN" >> $GITHUB_ENV

          # 在 Job Container 登入
          echo "$ECR_TOKEN" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # 調試：確認 docker config 位置和內容
          echo "=== Docker config locations ==="
          echo "HOME=$HOME"
          ls -la $HOME/.docker/config.json 2>/dev/null && echo "Config exists at \$HOME/.docker/" || echo "No config at \$HOME/.docker/"
          ls -la /root/.docker/config.json 2>/dev/null && echo "Config exists at /root/.docker/" || echo "No config at /root/.docker/"

          # 確保 /root/.docker/ 也有 config（dockerd 可能讀這裡）
          if [ "$HOME" != "/root" ] && [ -f "$HOME/.docker/config.json" ]; then
            mkdir -p /root/.docker
            cp "$HOME/.docker/config.json" /root/.docker/config.json
            echo "Copied config to /root/.docker/"
          fi

      # 05. 下載共享 Dockerfile
      - name: 05. 下載共享 Dockerfile
        run: |
          curl -fsSL -o /tmp/Dockerfile \
            "https://raw.githubusercontent.com/NaviTech-Solutions/workflows/refs/heads/main/.github/workflows/Dockerfile"
          echo "Dockerfile downloaded:"
          cat /tmp/Dockerfile

      # 06. 構建 Docker 映像
      - name: 06. 構建 Docker 映像
        run: |
          docker build \
            -f /tmp/Dockerfile \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            .

      # 07. 推送 Docker 映像到 Amazon ECR
      - name: 07. 推送 Docker 映像到 Amazon ECR
        run: |
          # 重新登入確保 credentials 生效
          echo "$ECR_TOKEN" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

          # 調試：確認登入狀態
          echo "=== Docker config ==="
          cat $HOME/.docker/config.json 2>/dev/null | grep -o '"auths":{[^}]*}' || echo "No auths found"
          cat /root/.docker/config.json 2>/dev/null | grep -o '"auths":{[^}]*}' || echo "No auths at /root"

          # 推送
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

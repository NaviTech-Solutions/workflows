name: Build Java to Docker Image and Push to ECR
on:
  workflow_call:
    inputs:
      aws-region:
        description: "AWS region"
        required: true
        default: "ap-east-1"
      aws-access-key-id:
        description: "AWS Access Key ID"
        required: true
      aws-secret-access-key:
        description: "AWS Secret Access Key"
        required: true
jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws-region }}
      ECR_REGISTRY: 390402541453.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com
    steps:
      # 01. 檢出代碼
      - name: 01. 檢出代碼
        uses: actions/checkout@v4.2.2

      # 02. 設置變數並打印信息
      - name: 02. 設置變數並打印信息
        run: |
          BRANCH_NAME=${{ github.ref_name }}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "Current branch: $BRANCH_NAME"

          REPO_NAME=$(basename "$PWD" | tr '[:upper:]' '[:lower:]')
          echo "ECR_REPOSITORY=$REPO_NAME" >> $GITHUB_ENV

          TAG_PREFIX="$BRANCH_NAME"
          echo "TAG_PREFIX=$TAG_PREFIX" >> $GITHUB_ENV

          IMAGE_TAG="${TAG_PREFIX}-$(date -u +"%Y%m%d-%H%M_UTC8" -d '+8 hours')"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          echo "ECR Repository: $ECR_REGISTRY/$REPO_NAME"
          echo "Image Tag: $IMAGE_TAG"

      # 03. 配置 AWS 認證
      - name: 03. 配置 AWS 認證
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ inputs.aws-access-key-id }}
          aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      # 04. 自動檢查並建立 ECR Repository
      - name: 04. 自動檢查並建立 ECR Repository
        uses: int128/create-ecr-repository-action@v1.325.0
        with:
          repository: ${{ env.ECR_REPOSITORY }}
          public: false

      # 05. 登入 Amazon ECR
      - name: 05. 登入 Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.1.2
        with:
          region: ${{ inputs.aws-region }}

      # 🔍 05-1. 測試 AWS 身份
      - name: Debug AWS Identity
        run: |
          aws sts get-caller-identity
      
      # 🔍 05-2. 測試 ECR pull（🔥最重要）
      - name: Debug ECR Pull
        run: |
          docker pull 390402541453.dkr.ecr.ap-east-1.amazonaws.com/openjdk:22-jdk-slim-bookworm

      # 06. 下載共享 Dockerfile
      - name: 06. 下載共享 Dockerfile
        run: |
          curl -fsSL -o /tmp/Dockerfile \
            "https://raw.githubusercontent.com/NaviTech-Solutions/workflows/refs/heads/main/.github/workflows/Dockerfile"
          echo "Dockerfile downloaded:"
          cat /tmp/Dockerfile

      # 07. 構建 Docker 映像
      - name: 07. 構建 Docker 映像
        run: |
          docker build \
            -f /tmp/Dockerfile \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            .

      # 08. 推送 Docker 映像到 Amazon ECR
      - name: 08. 推送 Docker 映像到 Amazon ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
